<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookie Monster</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --egg:#F5F0E8; --egg2:#EDE6D8; --egg3:#E2D9C8; --egg4:#D5C9B4;
    --choc:#3D1F0A; --choc2:#5C3317;
    --caramel:#A0622A; --caramel2:#C4834A;
    --cream:#FBF7F0; --muted:#9C8870; --muted2:#B8A898;
    --danger:#B83232; --danger-bg:rgba(184,50,50,0.1);
    --safe:#3D7A40; --safe-bg:rgba(61,122,64,0.1);
    --warn:#9B6A1A;
    --deleted:#2B6B80; --deleted-bg:rgba(43,107,128,0.1);
    --serif:'Fraunces',serif; --mono:'DM Mono',monospace; --body:'Nunito',sans-serif;
  }

  body { width:380px; min-height:200px; max-height:600px; background:var(--egg); color:var(--choc); font-family:var(--body); font-size:13px; overflow:hidden; display:flex; flex-direction:column; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; background:var(--cream); border-bottom:1.5px solid var(--egg4); flex-shrink:0; }
  .logo { display:flex; align-items:center; gap:9px; }
  .logo-svg { width:34px; height:34px; filter:drop-shadow(0 1px 2px rgba(61,31,10,0.2)); flex-shrink:0; }
  .logo-wordmark { display:flex; flex-direction:column; line-height:1; }
  .logo-main { font-family:var(--serif); font-size:18px; font-weight:700; color:var(--choc); letter-spacing:-0.01em; }
  .logo-main span { color:var(--caramel); font-style:italic; }
  .logo-sub { font-family:var(--mono); font-size:8px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:1px; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .site-pill { font-family:var(--mono); font-size:10px; color:var(--choc2); background:var(--egg2); border:1px solid var(--egg4); border-radius:20px; padding:3px 10px; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .settings-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; padding:2px; line-height:1; transition:color 0.15s; }
  .settings-btn:hover { color:var(--caramel); }

  /* BANNER */
  #flag-banner { background:linear-gradient(135deg,rgba(184,50,50,0.07),rgba(184,50,50,0.03)); border-bottom:1.5px solid rgba(184,50,50,0.18); flex-shrink:0; }
  .flag-banner-inner { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; }
  .flag-banner-left { display:flex; align-items:center; gap:10px; }
  .flag-banner-icon { font-size:16px; }
  .flag-banner-title { font-size:12px; font-weight:600; color:var(--danger); }
  .flag-banner-sub { font-size:10px; color:var(--muted); margin-top:1px; }
  .flag-banner-close { background:none; border:none; color:var(--muted2); cursor:pointer; font-size:12px; padding:2px 4px; border-radius:4px; transition:color 0.15s; }
  .flag-banner-close:hover { color:var(--choc); }

  /* STATS */
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; background:var(--cream); border-bottom:1.5px solid var(--egg4); flex-shrink:0; }
  .stat { padding:10px 0 9px; text-align:center; display:flex; flex-direction:column; gap:2px; border-right:1px solid var(--egg4); }
  .stat:last-child { border-right:none; }
  .stat-num { font-family:var(--mono); font-size:20px; font-weight:500; line-height:1; }
  .stat-num.flagged { color:var(--danger); }
  .stat-num.deleted { color:var(--deleted); }
  .stat-num.safe    { color:var(--safe); }
  .stat-num.total   { color:var(--caramel); }
  .stat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }

  /* TABS */
  .tabs { display:flex; background:var(--egg2); border-bottom:1.5px solid var(--egg4); flex-shrink:0; }
  .tab { flex:1; padding:8px 0; font-size:9px; font-weight:600; text-align:center; cursor:pointer; color:var(--muted); border:none; background:none; letter-spacing:0.05em; text-transform:uppercase; transition:all 0.15s; border-bottom:2px solid transparent; font-family:var(--body); }
  .tab.active { color:var(--caramel); border-bottom-color:var(--caramel); background:var(--cream); }
  .tab:hover:not(.active) { color:var(--choc2); background:var(--egg3); }

  /* CONTENT */
  .content { flex:1; overflow-y:auto; background:var(--egg); scrollbar-width:thin; scrollbar-color:var(--egg4) transparent; }
  .content::-webkit-scrollbar { width:4px; }
  .content::-webkit-scrollbar-thumb { background:var(--egg4); border-radius:2px; }

  /* LOADING / EMPTY */
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:12px; color:var(--muted); font-family:var(--mono); font-size:11px; }
  .spinner { width:22px; height:22px; border:2px solid var(--egg3); border-top-color:var(--caramel); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { display:flex; flex-direction:column; align-items:center; padding:28px 24px; gap:8px; text-align:center; }
  .empty-icon { font-size:28px; margin-bottom:4px; }
  .empty-title { font-family:var(--serif); font-size:16px; color:var(--choc); font-style:italic; }
  .empty-sub { color:var(--muted); font-size:12px; line-height:1.6; }

  /* SITE GROUP */
  .site-group { border-bottom:2px solid var(--egg3); }
  .site-group-header { display:flex; align-items:center; justify-content:space-between; padding:8px 14px 6px; background:var(--egg2); border-bottom:1px solid var(--egg3); position:sticky; top:0; z-index:1; }
  .site-group-left { display:flex; align-items:baseline; gap:8px; min-width:0; }
  .site-group-name { font-family:var(--mono); font-size:11px; font-weight:500; color:var(--choc2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .site-group-count { font-size:10px; color:var(--muted); flex-shrink:0; }
  .site-divider { height:4px; background:var(--egg2); }

  .site-delete-btn { background:transparent; border:1px solid var(--egg4); border-radius:5px; color:var(--muted); padding:3px 8px; font-size:9px; cursor:pointer; font-family:var(--mono); font-weight:500; letter-spacing:0.05em; text-transform:uppercase; transition:all 0.15s; flex-shrink:0; margin-left:8px; }
  .site-delete-btn:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }

  /* COOKIE ITEM */
  .cookie-item { display:flex; align-items:flex-start; justify-content:space-between; padding:9px 14px; border-bottom:1px solid var(--egg3); gap:10px; background:var(--egg); transition:background 0.1s; }
  .cookie-item:hover { background:var(--cream); }
  .cookie-item:last-child { border-bottom:none; }
  .cookie-item.is-deleted { opacity:0.65; }
  .cookie-left { flex:1; min-width:0; }
  .cookie-name { font-family:var(--mono); font-size:11px; font-weight:500; color:var(--choc); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .cookie-domain { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cookie-reason { font-size:10px; margin-top:4px; display:flex; align-items:center; gap:5px; }
  .severity-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .severity-high .severity-dot   { background:var(--danger); }
  .severity-medium .severity-dot { background:var(--warn); }
  .severity-low .severity-dot    { background:var(--caramel); }
  .severity-high .reason-text    { color:var(--danger); font-size:10px; }
  .severity-medium .reason-text  { color:var(--warn); font-size:10px; }
  .severity-low .reason-text     { color:var(--muted); font-size:10px; }
  .cookie-owner { font-size:10px; color:var(--safe); margin-top:3px; }
  .cookie-deleted-tag { font-size:10px; color:var(--deleted); margin-top:3px; font-family:var(--mono); }
  .cookie-category { font-size:10px; color:var(--muted); text-transform:capitalize; }

  /* LOG */
  .log-group { border-bottom:1px solid var(--egg3); }
  .log-group-header { padding:8px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; background:var(--cream); transition:background 0.1s; }
  .log-group-header:hover { background:var(--egg2); }
  .log-group-site { font-family:var(--mono); font-size:11px; color:var(--choc); font-weight:500; }
  .log-group-meta { display:flex; align-items:center; gap:8px; }
  .log-group-count { font-family:var(--mono); font-size:10px; color:var(--deleted); }
  .log-group-time { font-size:10px; color:var(--muted); }
  .log-group-chevron { font-size:10px; color:var(--muted); transition:transform 0.2s; }
  .log-group.open .log-group-chevron { transform:rotate(90deg); }
  .log-group-items { display:none; }
  .log-group.open .log-group-items { display:block; }

  /* DELETE BTN */
  .delete-btn { background:transparent; border:1px solid var(--egg4); border-radius:5px; color:var(--muted); padding:3px 8px; font-size:9px; cursor:pointer; font-family:var(--mono); font-weight:500; letter-spacing:0.05em; flex-shrink:0; transition:all 0.15s; margin-top:2px; text-transform:uppercase; }
  .delete-btn:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }
  .delete-btn.deleted { border-color:var(--deleted); color:var(--deleted); background:var(--deleted-bg); pointer-events:none; }

  /* FOOTER */
  .footer { padding:10px 14px; border-top:1.5px solid var(--egg4); background:var(--cream); flex-shrink:0; }
  .delete-all-btn { width:100%; padding:9px; background:var(--choc); border:none; border-radius:8px; color:var(--egg); font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; transition:all 0.15s; box-shadow:0 2px 6px rgba(61,31,10,0.2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .delete-all-btn:hover { background:var(--choc2); transform:translateY(-1px); }
  .delete-all-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .visit-note { font-size:9px; color:var(--muted2); text-align:center; margin-top:5px; font-family:var(--mono); letter-spacing:0.05em; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-svg" id="logo-svg"></div>
    <div class="logo-wordmark">
      <div class="logo-main">Cookie <span>Monster</span></div>
      <div class="logo-sub">Cookie Auditor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="site-pill" id="site-domain">scanning...</div>
    <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num flagged" id="stat-flagged">–</div><div class="stat-label">Flagged</div></div>
  <div class="stat"><div class="stat-num deleted" id="stat-deleted">–</div><div class="stat-label">Deleted</div></div>
  <div class="stat"><div class="stat-num safe" id="stat-safe">–</div><div class="stat-label">Safe</div></div>
  <div class="stat"><div class="stat-num total" id="stat-total">–</div><div class="stat-label">Total</div></div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="flagged">⚑ Flagged</button>
  <button class="tab" data-tab="deleted">🛡 Deleted</button>
  <button class="tab" data-tab="log">📋 Log</button>
  <button class="tab" data-tab="safe">✓ Safe</button>
</div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div><div>scanning cookies...</div></div>
</div>

<div class="footer" id="footer" style="display:none;">
  <button class="delete-all-btn" id="delete-all-btn" disabled>Delete All Flagged</button>
  <div class="visit-note" id="visit-note">across all visited sites</div>
</div>

<script>

  <path d="M 76 10 Q 88 16,88 28 Q 92 22,86 14 Q 82 8,76 10 Z" fill="#6B3F1A" opacity="0.5"/>

</svg>`;
</script>
<script src="popup.js"></script>
</body>
</html>
