<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Monster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0D0D;
    --surface: #161616;
    --surface2: #1E1E1E;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #F0EDE8;
    --muted: #888580;
    --accent: #FF6B35;
    --accent-dim: rgba(255,107,53,0.15);
    --accent-dim2: rgba(255,107,53,0.08);
    --safe: #3DDC84;
    --safe-dim: rgba(61,220,132,0.12);
    --warn: #FFB547;
    --warn-dim: rgba(255,181,71,0.12);
    --danger: #FF4757;
    --danger-dim: rgba(255,71,87,0.12);
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    width: 380px;
    min-height: 200px;
    max-height: 580px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span {
    color: var(--accent);
  }

  .site-pill {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* STATS ROW */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat {
    background: var(--bg);
    padding: 10px 0;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-num.flagged { color: var(--accent); }
  .stat-num.safe { color: var(--safe); }
  .stat-num.total { color: var(--text); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 9px 0;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    border: none;
    background: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s, border-bottom 0.15s;
    border-bottom: 2px solid transparent;
    font-family: var(--sans);
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 12px;
    color: var(--muted);
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY STATE */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px;
    gap: 8px;
    text-align: center;
  }

  .empty-icon { font-size: 32px; margin-bottom: 4px; }
  .empty-title { font-weight: 600; color: var(--text); font-size: 14px; }
  .empty-sub { color: var(--muted); font-size: 12px; line-height: 1.6; }

  /* COOKIE ITEM */
  .cookie-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.1s;
  }

  .cookie-item:hover { background: var(--surface); }
  .cookie-item:last-child { border-bottom: none; }

  .cookie-left { flex: 1; min-width: 0; }

  .cookie-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .cookie-domain {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cookie-reason {
    font-size: 10px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .severity-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .severity-high .severity-dot { background: var(--danger); }
  .severity-medium .severity-dot { background: var(--warn); }
  .severity-low .severity-dot { background: var(--accent); }

  .severity-high .reason-text { color: var(--danger); }
  .severity-medium .reason-text { color: var(--warn); }
  .severity-low .reason-text { color: var(--muted); }

  .cookie-owner {
    font-size: 10px;
    color: var(--safe);
    margin-top: 3px;
  }

  .cookie-category {
    font-size: 10px;
    color: var(--muted);
    text-transform: capitalize;
  }

  /* DELETE BTN */
  .delete-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 4px 8px;
    font-size: 10px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 500;
    flex-shrink: 0;
    transition: all 0.15s;
    margin-top: 2px;
  }

  .delete-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: var(--danger-dim);
  }

  .delete-btn.deleted {
    border-color: var(--safe);
    color: var(--safe);
    background: var(--safe-dim);
    pointer-events: none;
  }

  /* FOOTER */
  .footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .delete-all-btn {
    width: 100%;
    padding: 9px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .delete-all-btn:hover {
    background: var(--accent);
    color: #0D0D0D;
  }

  .delete-all-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 6px 14px 4px;
    font-weight: 600;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🍪</div>
    <div class="logo-text">Cookie<span>Monster</span></div>
  </div>
  <div class="site-pill" id="site-domain">scanning...</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num flagged" id="stat-flagged">–</div>
    <div class="stat-label">Flagged</div>
  </div>
  <div class="stat">
    <div class="stat-num safe" id="stat-safe">–</div>
    <div class="stat-label">Safe</div>
  </div>
  <div class="stat">
    <div class="stat-num total" id="stat-total">–</div>
    <div class="stat-label">Total</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="flagged">🚩 Flagged</button>
  <button class="tab" data-tab="safe">✓ Safe</button>
  <button class="tab" data-tab="all">All</button>
</div>

<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Scanning cookies...</div>
  </div>
</div>

<div class="footer" id="footer" style="display:none;">
  <button class="delete-all-btn" id="delete-all-btn" disabled>
    DELETE ALL FLAGGED
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
